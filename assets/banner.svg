<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1baf7a"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <g stroke="#3a5a68" stroke-width="1" opacity="0.25">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- cluster motif: 4 groups pop + pulse -->
  <g filter="url(#glow)">
    <g fill="#00c6ff">
      <circle cx="820" cy="120" r="6"><animate attributeName="r" values="0;6" begin="0.2s" dur="0.5s" fill="freeze"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.7s" repeatCount="indefinite"/></circle>
      <circle cx="840" cy="140" r="6"><animate attributeName="r" values="0;6" begin="0.3s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="815" cy="155" r="6"><animate attributeName="r" values="0;6" begin="0.4s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="845" cy="110" r="6"><animate attributeName="r" values="0;6" begin="0.5s" dur="0.5s" fill="freeze"/></circle>
    </g>
    <g fill="#1baf7a">
      <circle cx="960" cy="90" r="6"><animate attributeName="r" values="0;6" begin="0.4s" dur="0.5s" fill="freeze"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="985" cy="105" r="6"><animate attributeName="r" values="0;6" begin="0.5s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="970" cy="125" r="6"><animate attributeName="r" values="0;6" begin="0.6s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="995" cy="85" r="6"><animate attributeName="r" values="0;6" begin="0.7s" dur="0.5s" fill="freeze"/></circle>
    </g>
    <g fill="#eda100">
      <circle cx="900" cy="210" r="6"><animate attributeName="r" values="0;6" begin="0.6s" dur="0.5s" fill="freeze"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="925" cy="225" r="6"><animate attributeName="r" values="0;6" begin="0.7s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="905" cy="240" r="6"><animate attributeName="r" values="0;6" begin="0.8s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="930" cy="200" r="6"><animate attributeName="r" values="0;6" begin="0.9s" dur="0.5s" fill="freeze"/></circle>
    </g>
    <g fill="#e87ba4">
      <circle cx="1060" cy="190" r="6"><animate attributeName="r" values="0;6" begin="0.8s" dur="0.5s" fill="freeze"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="1085" cy="205" r="6"><animate attributeName="r" values="0;6" begin="0.9s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="1070" cy="220" r="6"><animate attributeName="r" values="0;6" begin="1.0s" dur="0.5s" fill="freeze"/></circle>
      <circle cx="1095" cy="185" r="6"><animate attributeName="r" values="0;6" begin="1.1s" dur="0.5s" fill="freeze"/></circle>
    </g>
  </g>

  <rect x="70" y="96" width="8" height="128" rx="4" fill="url(#accent)"/>
  <text x="105" y="130" font-size="46" font-weight="700" fill="#ffffff">Marketing Segmentation Analysis</text>
  <text x="105" y="176" font-size="24" font-weight="400" fill="#9fefd8">Customer Clustering with K-Means</text>

  <g font-size="16" font-weight="600">
    <rect x="105" y="205" width="150" height="34" rx="17" fill="#1baf7a" opacity="0.9"/>
    <text x="180" y="228" fill="#ffffff" text-anchor="middle">4 Segments</text>
    <rect x="267" y="205" width="160" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="347" y="228" fill="#cfeefc" text-anchor="middle">100 Customers</text>
    <rect x="439" y="205" width="150" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="514" y="228" fill="#cfeefc" text-anchor="middle">K-Means</text>
  </g>

  <text x="105" y="285" font-size="15" fill="#7fa9bd">Python · scikit-learn · Excel   |   Heta Chavda — Data Analytics Portfolio</text>

  <rect x="-260" y="0" width="260" height="320" fill="url(#shine)" transform="skewX(-20)">
    <animate attributeName="x" from="-260" to="1300" dur="4.5s" begin="1.4s" repeatCount="indefinite"/>
  </rect>
</svg>
