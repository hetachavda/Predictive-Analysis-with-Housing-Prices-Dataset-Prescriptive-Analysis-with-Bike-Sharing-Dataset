<svg width="1200" height="740" viewBox="0 0 1200 740" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7a55"/>
      <stop offset="100%" stop-color="#1baf7a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="740" fill="#f9f9f7"/>

  <!-- header -->
  <rect x="0" y="0" width="1200" height="86" fill="url(#head)"/>
  <text x="30" y="42" font-size="26" font-weight="700" fill="#ffffff">Customer Segmentation Dashboard</text>
  <text x="30" y="70" font-size="15" fill="#d6f5e8">K-Means clustering · 100 customers · 4 marketing segments</text>

  <!-- KPI tiles -->
  <rect x="30" y="110" width="360" height="110" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="30" y="110" width="6" height="110" rx="3" fill="#1baf7a"/>
  <text x="58" y="148" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">CUSTOMERS</text>
  <text x="56" y="198" font-size="46" font-weight="700" fill="#0b0b0b">100</text>

  <rect x="420" y="110" width="360" height="110" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="420" y="110" width="6" height="110" rx="3" fill="#2a78d6"/>
  <text x="448" y="148" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">SEGMENTS FOUND</text>
  <text x="446" y="198" font-size="46" font-weight="700" fill="#0b0b0b">4</text>

  <rect x="810" y="110" width="360" height="110" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="810" y="110" width="6" height="110" rx="3" fill="#eda100"/>
  <text x="838" y="148" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">HIGH-PRIORITY SEGMENTS</text>
  <text x="836" y="198" font-size="46" font-weight="700" fill="#0b0b0b">2</text>

  <!-- scatter panel -->
  <rect x="30" y="250" width="560" height="430" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="48" cy="282" r="5" fill="#1baf7a"/>
  <text x="62" y="287" font-size="16" font-weight="700" fill="#0b0b0b">Segments by Age &amp; Income</text>

  <!-- axes -->
  <line x1="90" y1="640" x2="560" y2="640" stroke="#c3c2b7" stroke-width="1.5"/>
  <line x1="90" y1="640" x2="90" y2="330" stroke="#c3c2b7" stroke-width="1.5"/>
  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="90" y1="562" x2="560" y2="562"/>
    <line x1="90" y1="485" x2="560" y2="485"/>
    <line x1="90" y1="408" x2="560" y2="408"/>
  </g>
  <text x="325" y="668" font-size="12" fill="#52514e" text-anchor="middle">Age →</text>
  <text x="60" y="485" font-size="12" fill="#52514e" text-anchor="middle" transform="rotate(-90 60 485)">Income →</text>

  <!-- clusters -->
  <g opacity="0.9">
    <!-- Young Professionals (blue) -->
    <g fill="#2a78d6">
      <circle cx="153" cy="485" r="7"/><circle cx="168" cy="470" r="7"/><circle cx="137" cy="491" r="7"/>
      <circle cx="184" cy="460" r="7"/><circle cx="160" cy="479" r="7"/><circle cx="176" cy="454" r="7"/>
    </g>
    <!-- Wealthy Seniors (green) -->
    <g fill="#1baf7a">
      <circle cx="419" cy="377" r="7"/><circle cx="443" cy="361" r="7"/><circle cx="466" cy="367" r="7"/>
      <circle cx="482" cy="346" r="7"/><circle cx="403" cy="392" r="7"/><circle cx="450" cy="355" r="7"/>
    </g>
    <!-- Moderately Engaged (yellow) -->
    <g fill="#eda100">
      <circle cx="262" cy="485" r="7"/><circle cx="286" cy="470" r="7"/><circle cx="309" cy="479" r="7"/>
      <circle cx="278" cy="460" r="7"/><circle cx="325" cy="491" r="7"/><circle cx="294" cy="473" r="7"/>
    </g>
    <!-- Low-Income Retirees (magenta) -->
    <g fill="#e87ba4">
      <circle cx="435" cy="578" r="7"/><circle cx="466" cy="562" r="7"/><circle cx="497" cy="584" r="7"/>
      <circle cx="482" cy="553" r="7"/><circle cx="450" cy="572" r="7"/><circle cx="513" cy="547" r="7"/>
    </g>
  </g>

  <!-- scatter legend -->
  <g font-size="11.5">
    <circle cx="150" cy="308" r="6" fill="#2a78d6"/><text x="162" y="312" fill="#52514e">Young Pros</text>
    <circle cx="255" cy="308" r="6" fill="#1baf7a"/><text x="267" y="312" fill="#52514e">Wealthy Seniors</text>
    <circle cx="390" cy="308" r="6" fill="#eda100"/><text x="402" y="312" fill="#52514e">Mod. Engaged</text>
    <circle cx="505" cy="308" r="6" fill="#e87ba4"/><text x="517" y="312" fill="#52514e">Retirees</text>
  </g>

  <!-- priority panel -->
  <rect x="615" y="250" width="555" height="430" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="633" cy="282" r="5" fill="#eda100"/>
  <text x="647" y="287" font-size="16" font-weight="700" fill="#0b0b0b">Marketing Priority by Segment</text>

  <!-- rows -->
  <!-- Young Pros -->
  <circle cx="648" cy="352" r="6" fill="#2a78d6"/>
  <text x="664" y="356" font-size="14" font-weight="600" fill="#0b0b0b">Young Professionals</text>
  <rect x="645" y="368" width="460" height="24" rx="6" fill="#eef1f4"/>
  <rect x="645" y="368" width="414" height="24" rx="6" fill="#2a78d6"/>
  <text x="1095" y="385" font-size="12" font-weight="700" fill="#ffffff" text-anchor="end">HIGH</text>

  <!-- Wealthy Seniors -->
  <circle cx="648" cy="442" r="6" fill="#1baf7a"/>
  <text x="664" y="446" font-size="14" font-weight="600" fill="#0b0b0b">Wealthy Seniors</text>
  <rect x="645" y="458" width="460" height="24" rx="6" fill="#eef1f4"/>
  <rect x="645" y="458" width="437" height="24" rx="6" fill="#1baf7a"/>
  <text x="1095" y="475" font-size="12" font-weight="700" fill="#ffffff" text-anchor="end">HIGH</text>

  <!-- Moderately Engaged -->
  <circle cx="648" cy="532" r="6" fill="#eda100"/>
  <text x="664" y="536" font-size="14" font-weight="600" fill="#0b0b0b">Moderately Engaged Pros</text>
  <rect x="645" y="548" width="460" height="24" rx="6" fill="#eef1f4"/>
  <rect x="645" y="548" width="253" height="24" rx="6" fill="#eda100"/>
  <text x="912" y="565" font-size="12" font-weight="700" fill="#52514e">MEDIUM</text>

  <!-- Retirees -->
  <circle cx="648" cy="622" r="6" fill="#e87ba4"/>
  <text x="664" y="626" font-size="14" font-weight="600" fill="#0b0b0b">Low-Income Retirees</text>
  <rect x="645" y="638" width="460" height="24" rx="6" fill="#eef1f4"/>
  <rect x="645" y="638" width="138" height="24" rx="6" fill="#e87ba4"/>
  <text x="797" y="655" font-size="12" font-weight="700" fill="#52514e">NURTURE</text>

  <!-- footer -->
  <text x="30" y="715" font-size="12" fill="#898781">Heta Chavda · Data Analytics Portfolio · github.com/hetachavda</text>
</svg>
